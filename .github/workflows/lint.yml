name: lint

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON manifests
        run: |
          python3 - <<'PY'
          import json, sys
          for p in [".cursor-plugin/plugin.json", "mcp.json"]:
              with open(p) as f:
                  json.load(f)
              print(f"OK json {p}")
          required = {"name", "description", "version", "author", "homepage", "repository", "license", "keywords"}
          with open(".cursor-plugin/plugin.json") as f:
              plug = json.load(f)
          missing = required - set(plug)
          if missing:
              print("Missing plugin.json fields:", sorted(missing), file=sys.stderr)
              sys.exit(1)
          mcp = json.load(open("mcp.json"))
          servers = mcp.get("mcpServers") or {}
          if "cachelayer" not in servers:
              print("mcp.json must define mcpServers.cachelayer", file=sys.stderr)
              sys.exit(1)
          auth = (servers["cachelayer"].get("headers") or {}).get("Authorization", "")
          if "${env:" not in auth:
              print("Cursor mcp.json Authorization must use ${env:NAME}", file=sys.stderr)
              sys.exit(1)
          print("OK plugin.json + mcp.json")
          PY
      - name: Rules presence
        run: test -f rules/cachelayer-interception.mdc && test -f skills/cachelayer-tools/SKILL.md
